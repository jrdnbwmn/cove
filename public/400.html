<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>400 Bad request | Cove</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #ffffff;
        color: #171717;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        padding: 24px;
      }

      header a {
        color: #171717;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
        text-decoration: none;
      }

      main {
        display: flex;
        min-height: calc(100vh - 66px);
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }

      .error-state {
        width: 100%;
        max-width: 24rem;
      }

      .icon {
        display: flex;
        width: 64px;
        height: 64px;
        margin: 0 auto 24px;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: #f5f5f5;
        color: #525252;
      }

      .icon svg {
        width: 28px;
        height: 28px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: 1.4;
      }

      p {
        margin: 8px 0 0;
        color: #737373;
        font-size: 16px;
        line-height: 1.5;
      }

      .button {
        display: inline-block;
        margin-top: 24px;
        padding: 10px 16px;
        border-radius: 10px;
        background: #171717;
        color: #ffffff;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
      }

      a:focus {
        outline: 3px solid #525252;
        outline-offset: 3px;
      }

      @media (max-width: 480px) {
        header,
        main {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/">Cove</a>
    </header>
    <main>
      <section class="error-state" aria-labelledby="error-heading">
        <div class="icon">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" x2="12" y1="8" y2="12" />
            <line x1="12" x2="12.01" y1="16" y2="16" />
          </svg>
        </div>
        <h1 id="error-heading">Bad request</h1>
        <p>We couldn't process this request. Please check the address and try again.</p>
        <a class="button" href="/">Back to home</a>
      </section>
    </main>
  </body>
</html>
