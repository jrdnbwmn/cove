name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bin/rubocop -f github

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bin/bundler-audit
      - run: bin/importmap audit
      - run: bin/brakeman --quiet --no-pager --exit-on-warn --exit-on-error

  # AIDEV-NOTE: No apt packages and no setup-chrome action needed here or in
  # test/system/seeds: pg and tailwindcss-ruby ship precompiled x86_64-linux
  # binaries in Gemfile.lock, and ubuntu-latest ships Chrome for Selenium
  # Manager to resolve.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd=pg_isready --health-interval=10s
          --health-timeout=5s --health-retries=3
    env:
      DB_HOST: localhost
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bin/rails db:test:prepare
      - run: bin/rails test

  # AIDEV-NOTE: No Tailwind build step needed: bin/rails test and test:system
  # both invoke the test:prepare hook, which tailwindcss-rails enhances with
  # tailwindcss:build.
  system:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd=pg_isready --health-interval=10s
          --health-timeout=5s --health-retries=3
    env:
      DB_HOST: localhost
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bin/rails db:test:prepare
      - run: bin/rails test:system
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: tmp/screenshots
          if-no-files-found: ignore

  seeds:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd=pg_isready --health-interval=10s
          --health-timeout=5s --health-retries=3
    env:
      DB_HOST: localhost
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bin/rails db:test:prepare
      - run: bin/rails db:seed:replant
