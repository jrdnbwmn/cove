"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = """
export PATH="$HOME/.local/share/mise/shims:$PATH"
set -e

# REPO_ROOT isn't always set by Conductor; fall back to the workspace cwd
REPO_ROOT="${REPO_ROOT:-$(pwd)}"

# Symlink gitignored local files so they stay in sync across workspaces
if [ -f "$CONDUCTOR_ROOT_PATH/CLAUDE.local.md" ]; then
  ln -sf "$CONDUCTOR_ROOT_PATH/CLAUDE.local.md" "$REPO_ROOT/CLAUDE.local.md"
fi

mkdir -p "$REPO_ROOT/.claude"

if [ -f "$CONDUCTOR_ROOT_PATH/.claude/claude.local.md" ]; then
  ln -sf "$CONDUCTOR_ROOT_PATH/.claude/claude.local.md" "$REPO_ROOT/.claude/claude.local.md"
fi

if [ -f "$CONDUCTOR_ROOT_PATH/.claude/settings.local.json" ]; then
  ln -sf "$CONDUCTOR_ROOT_PATH/.claude/settings.local.json" "$REPO_ROOT/.claude/settings.local.json"
fi

# Copy secrets rather than symlink — isolation matters more than sync
if [ -f "$CONDUCTOR_ROOT_PATH/config/master.key" ]; then
  cp "$CONDUCTOR_ROOT_PATH/config/master.key" "$REPO_ROOT/config/master.key"
fi

if [ -f "$CONDUCTOR_ROOT_PATH/config/credentials/test.key" ]; then
  cp "$CONDUCTOR_ROOT_PATH/config/credentials/test.key" "$REPO_ROOT/config/credentials/test.key"
fi

mise exec -- bash -c 'bundle check || bundle install'
RAILS_ENV=test mise exec -- bin/rails runner 'puts "Rails credentials OK"'
mise exec -- bin/setup --skip-server
"""

archive = """
export PATH="$HOME/.local/share/mise/shims:$PATH"
bin/rails log:clear tmp:clear
"""

run_mode = "nonconcurrent"

[scripts.run.dev]
command = "export PATH=\"$HOME/.local/share/mise/shims:$PATH\"; PORT=$CONDUCTOR_PORT bin/rails server -p $CONDUCTOR_PORT"
default = true
icon = "play"

[scripts.run.test]
command = "export PATH=\"$HOME/.local/share/mise/shims:$PATH\"; bin/rails test"
icon = "test-tube"

[scripts.run.rubocop]
command = "export PATH=\"$HOME/.local/share/mise/shims:$PATH\"; bin/rubocop"
icon = "wrench"
