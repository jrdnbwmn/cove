# Staging blueprint. Production is defined below but commented out until the
# cutover ticket provisions it.
services:
  - type: web
    name: cove-staging
    plan: free
    runtime: ruby
    region: oregon # the region must be consistent across all services for the internal keys to be read
    branch: main
    autoDeploy: true
    buildCommand: "./bin/render-build.sh"
    startCommand: bundle exec rails db:prepare && bundle exec rails server
    healthCheckPath: "/up"
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: staging
      - key: RACK_ENV
        value: staging
      - key: SOLID_QUEUE_IN_PUMA
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: cove-staging-db
          property: connectionString
      - key: CABLE_DATABASE_URL
        fromDatabase:
          name: cove-staging-db
          property: connectionString
      - key: CACHE_DATABASE_URL
        fromDatabase:
          name: cove-staging-db
          property: connectionString
      - key: QUEUE_DATABASE_URL
        fromDatabase:
          name: cove-staging-db
          property: connectionString

  # Production is dormant until the cutover ticket. Whether to enable
  # autoDeploy for production is a decision for that ticket, not this one.
  # - type: web
  #   name: cove-production
  #   plan: basic-256mb
  #   runtime: ruby
  #   region: oregon # the region must be consistent across all services for the internal keys to be read
  #   branch: main
  #   autoDeploy: false
  #   buildCommand: "./bin/render-build.sh"
  #   preDeployCommand: bundle exec rails db:prepare
  #   startCommand: bundle exec rails server
  #   healthCheckPath: "/up"
  #   envVars:
  #     - key: RAILS_MASTER_KEY
  #       sync: false
  #     - key: RAILS_ENV
  #       value: production
  #     - key: RACK_ENV
  #       value: production
  #     - key: SOLID_QUEUE_IN_PUMA
  #       value: true
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: cove-production-db
  #         property: connectionString
  #     - key: CABLE_DATABASE_URL
  #       fromDatabase:
  #         name: cove-production-db
  #         property: connectionString
  #     - key: CACHE_DATABASE_URL
  #       fromDatabase:
  #         name: cove-production-db
  #         property: connectionString
  #     - key: QUEUE_DATABASE_URL
  #       fromDatabase:
  #         name: cove-production-db
  #         property: connectionString

# Render's "free" databases are deleted after 30 days unless upgraded and only one per workspace.
databases:
  - name: cove-staging-db
    plan: free
    region: oregon # the region must be consistent across all services for the internal keys to be read
    ipAllowList: [] # only allow internal connections

